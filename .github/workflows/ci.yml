name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 纯静态前端、零运行时依赖：CI 仅在 Node 下跑自测脚本。
# _uitest / _kotest 依赖 jsdom（仅测试期），按需临时安装、不写入仓库。
jobs:
  test:
    name: 自测脚本（冒烟 / UI / KO）
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装测试依赖（jsdom，仅测试期）
        run: npm install --no-save jsdom

      - name: 冒烟测试（engine 自动重跑生涯）
        run: node _smoketest.js 2000

      - name: UI 冒烟（jsdom 跑通完整生涯编排）
        run: node _uitest.js 2

      - name: KO 模块专项（季后赛 / 深渊晋级图）
        run: node _kotest.js
