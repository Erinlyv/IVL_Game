<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>IVL 模拟器 · 可玩切片 demo-v4.2（策划 v7.1 / 数值 v6.1 / 文案 v2.1）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- v4.2 修复（移动端打不开）：Google Fonts 在国内/微信内置浏览器常被墙或超时，
       而外链样式表默认是「渲染阻塞」资源——请求挂起会导致连启动页都画不出、表现为
       「点继续访问后卡住/白屏」。改为 media=print + onload 切换的非阻塞加载：页面立即
       用系统字体（PingFang SC / 系统无衬线）渲染，字体可达时再异步升级；不可达则一直
       用系统字体兜底，绝不阻塞首屏。 -->
  <link rel="stylesheet" media="print" onload="this.media='all'"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="chargen.css" />
  <!-- 访问统计：GoatCounter（免费 / 轻量 / 无 cookie，GitHub Pages 无内置统计需自行接入）。
       使用步骤：到 https://www.goatcounter.com/ 注册一个免费站点（如 erinlyv-ivl），
       再把下方 data-goatcounter 的 YOURNAME 换成你的子域名即可。后台可看访问量 + 自定义事件
       （game_started / character_created / first_match / ending_reached 漏斗，见 game.js 的 track()）。
       注：占位符 YOURNAME 未替换前不会产生有效统计，但也不会报错或影响游戏。 -->
  <script data-goatcounter="https://YOURNAME.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <!-- v4.0 启动页（取自 UI设计/demo9-启动页A-电影首帧.html），样式统一作用域到 #splash 以免与正文样式冲突 -->
  <style>
    #splash { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; text-align: center;
      padding: 30px; overflow: hidden; background: #05070d; color: #eef2f8;
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
      transition: opacity .6s ease; }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .bgfx { position: absolute; inset: -10%; z-index: 0;
      background:
        radial-gradient(900px 560px at 50% -8%, rgba(226,181,62,.20), transparent 55%),
        radial-gradient(760px 620px at 16% 116%, rgba(59,90,160,.34), transparent 56%),
        radial-gradient(700px 620px at 88% 108%, rgba(110,168,254,.16), transparent 58%),
        #0b1120;
      animation: sp-drift 30s ease-in-out infinite alternate; }
    @keyframes sp-drift { from { transform: scale(1.05) translate(0,0); } to { transform: scale(1.14) translate(-1.5%,-1%); } }
    #splash .beam { position: absolute; top: -12%; left: 50%; width: 64vw; height: 80vh; z-index: 1; transform: translateX(-50%);
      background: conic-gradient(from 180deg at 50% 0, transparent 42%, rgba(245,207,106,.12) 50%, transparent 58%);
      filter: blur(6px); pointer-events: none; animation: sp-sway 12s ease-in-out infinite alternate; }
    @keyframes sp-sway { from { transform: translateX(-50%) rotate(-2.5deg); } to { transform: translateX(-50%) rotate(2.5deg); } }
    #splash .orbs { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    #splash .orb { position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,207,106,.95), rgba(245,207,106,0) 70%);
      filter: drop-shadow(0 0 6px rgba(245,207,106,.7)); opacity: 0;
      animation: sp-wander var(--d,22s) ease-in-out var(--delay,0s) infinite; }
    #splash .orb.w { background: radial-gradient(circle, rgba(255,255,255,.9), rgba(255,255,255,0) 70%);
      filter: drop-shadow(0 0 6px rgba(255,255,255,.6)); }
    #splash .orb.b { background: radial-gradient(circle, rgba(150,190,255,.9), rgba(150,190,255,0) 70%);
      filter: drop-shadow(0 0 6px rgba(130,175,255,.6)); }
    @keyframes sp-wander {
      0% { opacity: 0; transform: translate(0,0); }
      15% { opacity: .9; }
      50% { transform: translate(var(--mx,30px), var(--my,-46px)); }
      85% { opacity: .7; }
      100% { opacity: 0; transform: translate(calc(var(--mx,30px)*.4), calc(var(--my,-46px)*1.8)); }
    }
    #splash .vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(0,0,0,.6)); }
    #splash .menu { position: relative; z-index: 3; animation: sp-rise 1s cubic-bezier(.16,1,.3,1) both; }
    @keyframes sp-rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }
    #splash .sp-logo { font-family: 'Sora'; font-weight: 800; letter-spacing: 2px; line-height: .92;
      font-size: clamp(74px,18vw,176px);
      background: linear-gradient(180deg, #f1e6cf 20%, #e3b840 126%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 10px 50px rgba(226,181,62,.34)); animation: sp-glow 5s ease-in-out infinite; }
    @keyframes sp-glow { 50% { filter: drop-shadow(0 10px 70px rgba(245,207,106,.55)); } }
    #splash .sp-sub { font-family: 'Sora'; font-weight: 500; letter-spacing: 9px; font-size: clamp(12px,2.4vw,17px);
      color: #9fabc2; margin-top: 8px; }
    #splash .btns { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 50px; }
    #splash .mbtn { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 12px;
      width: min(340px,78vw); font-family: 'Sora'; font-weight: 700; font-size: 18px; letter-spacing: 1px;
      padding: 17px 30px; border-radius: 13px; cursor: pointer; color: #eef2f8;
      background: rgba(19,29,49,.5); border: 1px solid rgba(255,255,255,.14); backdrop-filter: blur(8px);
      transition: transform .2s cubic-bezier(.16,1,.3,1), border-color .2s, background .2s, box-shadow .2s, letter-spacing .2s; }
    #splash .mbtn svg { width: 20px; height: 20px; opacity: .85; }
    #splash .mbtn:hover { transform: translateY(-2px) scale(1.015); border-color: #f5cf6a; background: rgba(29,41,66,.72); letter-spacing: 2px; }
    #splash .mbtn:focus-visible { outline: 2px solid #f5cf6a; outline-offset: 3px; }
    #splash .mbtn[hidden] { display: none; }
    #splash .mbtn.primary { color: #1a1205; background: linear-gradient(135deg, #f5cf6a, #e2b53e); border-color: #f5cf6a;
      box-shadow: 0 16px 40px rgba(226,181,62,.4); }
    #splash .mbtn.primary:hover { filter: brightness(1.06); box-shadow: 0 20px 52px rgba(245,207,106,.5); }
    #splash .mbtn.primary::after { content: ""; position: absolute; inset: -2px; border-radius: 14px; z-index: -1;
      background: linear-gradient(135deg, #f5cf6a, #e2b53e); filter: blur(14px); opacity: .5; animation: sp-breathe 3.4s ease-in-out infinite; }
    @keyframes sp-breathe { 50% { opacity: .85; } }
    #splash .ver { position: absolute; z-index: 4; bottom: 20px; left: 0; right: 0; text-align: center;
      font-family: 'Sora'; font-size: 10.5px; letter-spacing: 3px; color: #6b7894; }
    @media (max-width: 600px) { #splash .sp-sub { letter-spacing: 5px; } }
    @media (prefers-reduced-motion: reduce) { #splash * { animation: none !important; transition-duration: .001ms !important; } }
  </style>
</head>
<body>
  <!-- v4.0 启动页（电影首帧 · 居中主菜单） -->
  <div id="splash">
    <div class="bgfx"></div>
    <div class="beam"></div>
    <div class="orbs">
      <span class="orb"    style="left:14%;top:64%;--mx:40px;--my:-120px;--d:24s;--delay:0s"></span>
      <span class="orb w"  style="left:26%;top:38%;--mx:-32px;--my:-90px;--d:30s;--delay:5s"></span>
      <span class="orb b"  style="left:40%;top:74%;--mx:50px;--my:-150px;--d:27s;--delay:2s"></span>
      <span class="orb"    style="left:58%;top:30%;--mx:-46px;--my:-110px;--d:33s;--delay:8s"></span>
      <span class="orb w"  style="left:70%;top:60%;--mx:36px;--my:-130px;--d:26s;--delay:3.5s"></span>
      <span class="orb"    style="left:84%;top:44%;--mx:-40px;--my:-100px;--d:31s;--delay:6.5s"></span>
      <span class="orb b"  style="left:48%;top:52%;--mx:28px;--my:-140px;--d:29s;--delay:11s"></span>
      <span class="orb w"  style="left:90%;top:70%;--mx:-30px;--my:-95px;--d:28s;--delay:9s"></span>
    </div>
    <div class="vignette"></div>
    <div class="menu">
      <h1 class="sp-logo">IVL</h1>
      <div class="sp-sub">模 拟 器</div>
      <div class="btns">
        <button class="mbtn primary" id="splashStart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3z"/></svg>
          开始生涯
        </button>
        <button class="mbtn" id="splashCodex" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.6 6.6L21.5 9l-5.2 4.4L18 21l-6-3.6L6 21l1.7-7.6L2.5 9l6.9-.4L12 2z"/></svg>
          结局与成就
        </button>
      </div>
    </div>
    <div class="ver">IVL SIMULATOR · v4.2</div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="crest">IVL</div>
        <div class="brandtext">
          <div class="logo">IVL <span>模拟器</span></div>
          <div class="ey">PRO PLAYER · CAREER DOSSIER</div>
        </div>
      </div>
      <div class="tagline">第五人格 · 职业电竞选手生涯模拟 · 可玩垂直切片 demo-v4.2</div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div id="hud" class="hud"></div>
        <div class="logwrap">
          <div class="logtitle">事件流水</div>
          <div id="log" class="log"></div>
        </div>
      </aside>

      <section class="stage">
        <div id="main" class="main"></div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- demo6 角色创建覆盖层挂载点 -->
  <div id="cc"></div>

  <script src="engine.js"></script>
  <script src="chargen.js"></script>
  <script src="game.js"></script>
</body>
</html>
